spring:
  application:
    name: signal-evaluation-service
  datasource:
    url: ${CHEDDARFLOW_DB_URL:jdbc:postgresql://localhost:5432/cheddarflow}
    username: ${CHEDDARFLOW_DB_USERNAME:cheddarflow}
    password: ${CHEDDARFLOW_DB_PASSWORD:cheddarflow}
  artemis:
    mode: native
    broker-url: ${CHEDDARFLOW_ARTEMIS_BROKER_URL:tcp://localhost:61616}
    user: ${CHEDDARFLOW_ARTEMIS_USERNAME:artemis}
    password: ${CHEDDARFLOW_ARTEMIS_PASSWORD:artemis}
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: signal_evaluation
    schemas: signal_evaluation
    create-schemas: true
    table: flyway_schema_history_signal_evaluation

server:
  port: ${SERVER_PORT:8789}

cheddarflow:
  outbox:
    relay-delay-ms: ${CHEDDARFLOW_OUTBOX_RELAY_DELAY_MS:1000}
    batch-size: ${CHEDDARFLOW_OUTBOX_BATCH_SIZE:25}
  signal:
    candidate-premium-threshold: ${CHEDDARFLOW_SIGNAL_CANDIDATE_PREMIUM_THRESHOLD:1000000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
