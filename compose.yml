services:
  postgres:
    image: postgres:16-alpine
    container_name: cheddarflow-postgres
    environment:
      POSTGRES_DB: cheddarflow
      POSTGRES_USER: cheddarflow
      POSTGRES_PASSWORD: cheddarflow
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cheddarflow -d cheddarflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - cheddarflow-postgres-data:/var/lib/postgresql/data

  artemis:
    image: apache/activemq-artemis:latest-alpine
    container_name: cheddarflow-artemis
    environment:
      ARTEMIS_USER: artemis
      ARTEMIS_PASSWORD: artemis
      ANONYMOUS_LOGIN: "false"
    ports:
      - "61616:61616"
      - "8161:8161"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 61616"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - cheddarflow-artemis-data:/var/lib/artemis-instance

volumes:
  cheddarflow-postgres-data:
  cheddarflow-artemis-data:
